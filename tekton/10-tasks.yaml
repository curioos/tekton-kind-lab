apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: clone-repo
  namespace: tekton-lab
spec:
  params:
  - name: url
    type: string
  - name: revision
    type: string
    default: main
  - name: subdirectory
    type: string
    default: ""
  workspaces:
  - name: output
  steps:
  - name: clone
    image: alpine/git:2.45.2
    script: |
      #!/bin/sh
      set -eu
      tmpdir="$(mktemp -d)"
      git clone --depth 1 --branch "$(params.revision)" "$(params.url)" "${tmpdir}/repo"

      source_dir="${tmpdir}/repo"
      if [ -n "$(params.subdirectory)" ]; then
        source_dir="${tmpdir}/repo/$(params.subdirectory)"
      fi

      rm -rf "$(workspaces.output.path)"/*
      cp -R "${source_dir}/." "$(workspaces.output.path)/"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: unit-tests
  namespace: tekton-lab
spec:
  workspaces:
  - name: source
  steps:
  - name: test
    image: python:3.12-alpine
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      set -eu
      if [ -f requirements.txt ]; then
        pip install -r requirements.txt
      fi

      if ls test_*.py >/dev/null 2>&1 || [ -d tests ]; then
        pytest -q
      else
        echo "No pytest tests found. Skipping tests."
      fi
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-image
  namespace: tekton-lab
spec:
  params:
  - name: image
    type: string
  - name: dockerfile
    type: string
    default: Dockerfile
  - name: context
    type: string
    default: .
  workspaces:
  - name: source
  steps:
  - name: kaniko-build
    image: gcr.io/kaniko-project/executor:v1.23.2-debug
    command:
    - /kaniko/executor
    args:
    - --dockerfile=$(workspaces.source.path)/$(params.dockerfile)
    - --context=$(workspaces.source.path)/$(params.context)
    - --destination=$(params.image)
    - --insecure
    - --skip-tls-verify
    - --insecure-pull
